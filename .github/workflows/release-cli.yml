name: Release CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: macos-x86_64
          - runner: macos-15
            target: macos-arm64
          - runner: ubuntu-24.04
            target: linux-x86_64
    steps:
      - uses: actions/checkout@v6
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes libcurl4-openssl-dev libsqlite3-dev
      - name: Run unit tests
        run: swift test
      - name: Build release binary
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            swift build --configuration release \
              --product codexbar-to-greptimedb \
              --static-swift-stdlib
          else
            swift build --configuration release --product codexbar-to-greptimedb
          fi
      - name: Package release archive
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -eu
          binary=codexbar-to-greptimedb
          version_without_prefix="${VERSION#v}"
          asset_name="$binary-$version_without_prefix-$TARGET.tar.gz"
          mkdir -p dist/staging
          cp ".build/release/$binary" "dist/staging/$binary"
          tar -C dist/staging -czf "dist/$asset_name" "$binary"
          (
            cd dist
            if command -v shasum >/dev/null 2>&1; then
              shasum -a 256 "$asset_name" > "$asset_name.sha256"
            else
              sha256sum "$asset_name" > "$asset_name.sha256"
            fi
          )
      - name: Smoke test Linux release archive
        if: runner.os == 'Linux'
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -eu
          asset_name="codexbar-to-greptimedb-${VERSION#v}-$TARGET.tar.gz"
          docker run --rm \
            --volume "$PWD/dist:/dist:ro" \
            --env ASSET_NAME="$asset_name" \
            ubuntu:24.04 \
            bash -ceu '
              apt-get update -qq
              apt-get install -y -qq curl libsqlite3-0
              mkdir /release
              tar -xzf "/dist/$ASSET_NAME" -C /release
              /release/codexbar-to-greptimedb --help
            '
      - name: Upload release payload
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: release-*
          path: release
          merge-multiple: true
      - name: Verify release checksums
        working-directory: release
        run: |
          set -eu
          for checksum in *.sha256; do
            sha256sum --check "$checksum"
          done
      - name: Publish complete release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -eu
          if gh release view "$TAG" --json isDraft --jq '.isDraft' >/dev/null 2>&1; then
            is_draft="$(gh release view "$TAG" --json isDraft --jq '.isDraft')"
            if [ "$is_draft" != "true" ]; then
              printf '%s\n' "error: release $TAG is already published" >&2
              exit 1
            fi
          else
            gh release create "$TAG" \
              --draft \
              --title "codexbar-to-greptimedb $TAG" \
              --generate-notes
          fi
          gh release upload "$TAG" release/* --clobber
          gh release edit "$TAG" --draft=false


  publish-homebrew:
    name: Publish Homebrew Formula
    needs: publish
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v5
        with:
          pattern: release-macos-*
          path: release
          merge-multiple: true
      - name: Checkout Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: smartcrabai/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Generate Homebrew formula
        env:
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          arm64_asset="codexbar-to-greptimedb-${version}-macos-arm64.tar.gz"
          x86_64_asset="codexbar-to-greptimedb-${version}-macos-x86_64.tar.gz"

          VERSION="$TAG" \
            REPOSITORY="$REPOSITORY" \
            MACOS_ARM64_SHA256="$(cut -d ' ' -f 1 "release/${arm64_asset}.sha256")" \
            MACOS_X86_64_SHA256="$(cut -d ' ' -f 1 "release/${x86_64_asset}.sha256")" \
            OUTPUT="homebrew-tap/Formula/codexbar-to-greptimedb.rb" \
            bash scripts/generate-homebrew-formula.sh
      - name: Commit formula
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          formula="Formula/codexbar-to-greptimedb.rb"
          git -C homebrew-tap config user.name "github-actions[bot]"
          git -C homebrew-tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C homebrew-tap add "$formula"
          if git -C homebrew-tap diff --cached --quiet; then
            exit 0
          fi
          git -C homebrew-tap commit -m "codexbar-to-greptimedb ${TAG}"
          git -C homebrew-tap push